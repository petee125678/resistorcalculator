<html>
<body style="background-color:#fff8ef; color:404040;">

    const myForm = document.getElementById("questions");
 myForm.addEventListener("submit", function(event){event.preventDefault()})

    function calculateit() {
 let conv1 = document.getElementById("num1").value;
 let conv2 = document.getElementById("num2").value;
 let conv3 = document.getElementById("num3").value;
 let num1st;
 let num2nd;
 let num3rd;
if (conv1 === "black" || conv1 === "Black") {num1st= 0, document.getElementById("pic1").src = "black.png",document.getElementById("resistor").src = "resistoe.png"} 
else if (conv1 === "brown" || conv1 === "Brown") {num1st=1, document.getElementById("pic1").src = "brown.png",document.getElementById("resistor").src = "resistoe.png"}
else if (conv1 === "red" || conv1 === "Red") {num1st=2 , document.getElementById("pic1").src = "red.png",document.getElementById("resistor").src = "resistoe.png"}

else if (conv1 === "white" || conv1 === "White") {num1st=9 , document.getElementById("pic1").src = "white.png",document.getElementById("resistor").src = "resistoe.png"};


if (conv2 === "black" || conv2 === "Black") {num2nd= 0 , document.getElementById("pic2").src = "black.png"}
else if (conv2 === "brown" || conv2 === "Brown") {num2nd=1, document.getElementById("pic2").src = "brown.png"}

else if (conv2 === "yellow" || conv2 === "Yellow") {num2nd=4, document.getElementById("pic2").src = "yellow.png"}
else if (conv2 === "green" || conv2 === "Green") {num2nd =5, document.getElementById("pic2").src = "green.png"}
else if (conv2 === "blue" || conv2 === "Blue") {num2nd =6, document.getElementById("pic2").src = "blue.png"}
else if (conv2 === "Purple" || conv2 === "purple" || conv2 === "violet" || conv2 === "Violet") {num2nd=7, document.getElementById("pic2").src = "purple.png"}
else if (conv2 === "gray" || conv2 === "Gray" || conv2 === "grey" || conv2 === "Grey") {num2nd=8, document.getElementById("pic2").src = "grey.png"}
else if (conv2 === "white" || conv2 === "White") {num2nd=9, document.getElementById("pic2").src = "white.png"};


if (conv3 === "black" || conv3 === "Black") {num3rd= 0, document.getElementById("pic3").src = "black.png"}
else if (conv3 === "brown" || conv3 === "Brown") {num3rd=1, document.getElementById("pic3").src = "brown.png"}

else if (conv3 === "white" || conv3 === "White") {num3rd=9, document.getElementById("pic3").src = "white.png"};


 let firsthalf =  "" + num1st + num2nd
 let answer = +firsthalf * +(10 ** num3rd)
 document.getElementById("result").textContent = "its "+answer+"Ω" ;
 if (isNaN(answer)) {document.getElementById("result").textContent = "Error! try again with no spaces and proper colors"}
    }
